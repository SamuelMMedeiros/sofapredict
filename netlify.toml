# Netlify Configuration for SofaPredict

[build]
  # Build command
  command = "pnpm build"
  
  # Directory to deploy
  publish = "dist"
  
  # Build environment
  environment = { NODE_VERSION = "22.13.0" }

# Environment variables (set in Netlify UI)
[build.environment]
  NODE_ENV = "production"

# Redirect all non-file requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# API endpoints
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Error pages
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

# Webhook configuration (optional, for payment webhooks)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
